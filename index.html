<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IR 멘토링 에이전트 — SparkLabs</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f7f8fa; color: #1a1a2e;
    min-height: 100vh; padding: 2rem 1.5rem 4rem;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
  input, select, textarea {
    width: 100%; padding: 8px 11px; font-size: 13px;
    border: 1px solid #ddd; border-radius: 8px;
    background: #fff; color: #1a1a2e; font-family: inherit;
    outline: none; transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: #4a6cf7; }
  textarea { resize: vertical; line-height: 1.6; }
  button {
    padding: 9px 22px; font-size: 13px; font-weight: 600;
    border: none; border-radius: 8px; cursor: pointer;
    background: #1a1a2e; color: #fff; font-family: inherit;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  button.secondary { background: #f1f3f4; color: #444; font-weight: 500; }
  button.secondary:hover { background: #e8eaed; opacity: 1; }
  button.accent { background: #4a6cf7; color: #fff; }

  .top-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 1.75rem; }
  .top-nav a { font-size: 12px; color: #999; text-decoration: none; }
  .top-nav a:hover { color: #444; }
  .top-nav .sep { color: #ccc; }
  .top-nav .current { font-size: 12px; color: #444; font-weight: 500; }
  .page-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: #666; margin-bottom: 1.75rem; line-height: 1.5; }

  .api-bar {
    background: #fff; border: 1px solid #e8eaed; border-radius: 10px;
    padding: 0.85rem 1.1rem; margin-bottom: 1.25rem;
    display: flex; align-items: center; gap: 10px;
  }
  .api-bar label { margin: 0; flex-shrink: 0; font-weight: 500; font-size: 12px; color: #555; }
  .api-bar input { flex: 1; margin: 0; font-family: monospace; font-size: 12px; }
  .api-status { font-size: 11px; flex-shrink: 0; }
  .api-status.ok { color: #2e7d32; }
  .api-status.no { color: #999; }

  .card { background: #fff; border: 1px solid #e8eaed; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 1rem; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .error-box { background: #fdecea; border: 1px solid #f5c6c2; border-radius: 8px; padding: 8px 12px; font-size: 13px; color: #c62828; margin-bottom: 12px; }

  #loading { display: none; text-align: center; padding: 4rem 0; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e8eaed; border-top-color: #4a6cf7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-msg { font-size: 15px; color: #444; margin-bottom: 4px; }
  .loading-sub { font-size: 13px; color: #999; }
  .progress-bar { width: 200px; height: 4px; background: #e8eaed; border-radius: 2px; margin: 16px auto 0; overflow: hidden; }
  .progress-fill { height: 100%; background: #4a6cf7; border-radius: 2px; transition: width 0.5s ease; }

  #result { display: none; }
  .result-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
  .result-header h2 { font-size: 18px; font-weight: 600; }
  .result-meta { font-size: 13px; color: #666; margin-top: 2px; }

  .info-box { background: #fff; border: 1px solid #e8eaed; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 0.85rem; }
  .box-label { font-size: 11px; font-weight: 600; color: #999; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 5px; }
  .positioning-text { font-size: 15px; font-weight: 600; color: #1a1a2e; margin-bottom: 10px; }
  .story-text { font-size: 13px; color: #555; line-height: 1.7; }

  .confirm-banner { background: #fff8e1; border: 1px solid #ffe082; border-radius: 10px; padding: 0.85rem 1.1rem; margin-bottom: 0.85rem; }
  .confirm-banner .banner-title { font-size: 12px; font-weight: 600; color: #e65100; margin-bottom: 6px; }
  .confirm-item { font-size: 12px; color: #bf360c; margin-bottom: 3px; }

  .table-wrap { background: #fff; border: 1px solid #e8eaed; border-radius: 12px; overflow: hidden; margin-bottom: 1rem; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: #1a1a2e; }
  thead th { padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600; color: #fff; letter-spacing: 0.05em; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid #f1f3f4; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafbfc; }
  tbody tr.has-confirm { background: #fffde7; }
  tbody tr.has-confirm:hover { background: #fff8e1; }
  td { padding: 10px 12px; vertical-align: top; line-height: 1.55; }
  td.pg { font-size: 11px; color: #aaa; white-space: nowrap; font-weight: 600; width: 32px; }
  td.section { white-space: nowrap; width: 85px; }
  .sec-tag { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 4px; }
  td.headline { min-width: 180px; font-weight: 500; color: #1a1a2e; }
  td.facts { min-width: 150px; color: #444; }
  td.reframe { min-width: 150px; }
  td.confirm { min-width: 130px; }
  .fact-item { display: flex; gap: 5px; margin-bottom: 2px; font-size: 12px; }
  .fact-dot { color: #ccc; flex-shrink: 0; }
  .reframe-text { font-size: 12px; color: #1a56db; background: #e8f0fe; border-radius: 4px; padding: 4px 7px; line-height: 1.5; display: block; }
  .confirm-text { font-size: 12px; color: #e65100; background: #fff8e1; border-radius: 4px; padding: 4px 7px; line-height: 1.5; display: block; }
  .empty-cell { color: #ddd; font-size: 12px; }

  .update-card { background: #fff; border: 1px solid #e8eaed; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  .update-desc { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 12px; }
  .update-actions { display: flex; gap: 8px; margin-top: 10px; }
</style>
</head>
<body>
<div class="container">

  <div class="top-nav">
    <a href="../">SparkLabs Tools</a>
    <span class="sep">›</span>
    <span class="current">IR 멘토링 에이전트</span>
  </div>

  <div class="page-title">IR 멘토링 에이전트</div>
  <div class="page-sub">기업 설문 + KPI 노트 → 20페이지 핵심 메시지 & 스토리라인 표<br>멘토링 세션 중 추가 확인 내용을 반영해 업데이트할 수 있습니다.</div>

  <div class="api-bar">
    <label for="apiKey">Anthropic API Key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." oninput="onApiKeyChange()">
    <span class="api-status no" id="apiStatus">미입력</span>
  </div>

  <div id="inputSection">
    <div class="card">
      <div class="card-title">기업 정보</div>
      <div class="grid-3">
        <div><label>기업명 *</label><input type="text" id="company" placeholder="예: 서프라이스"></div>
        <div><label>담당 멘토</label><input type="text" id="mentor" placeholder="예: 이희윤"></div>
        <div><label>투자 단계</label>
          <select id="stage">
            <option>Pre-Seed</option><option>Seed</option>
            <option selected>Pre-A</option>
            <option>Series A</option><option>Series B+</option>
          </select>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">기업 설문 답변 *</div>
      <textarea id="survey" rows="8" placeholder="설문지 답변 전체를 그대로 붙여넣으세요."></textarea>
    </div>
    <div class="card">
      <div class="card-title">멘토 KPI 노트 & 코멘트</div>
      <textarea id="kpiNote" rows="6" placeholder="사전진단 미팅 메모, KPI 세팅 내용, 핵심 인사이트 등"></textarea>
    </div>
    <div id="inputError" class="error-box" style="display:none"></div>
    <button onclick="runStage1()">핵심 메시지 & 스토리라인 생성 →</button>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-msg" id="loadingMsg">분석 중...</div>
    <div class="loading-sub" id="loadingSub">잠시만 기다려주세요</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div id="result">
    <div class="result-header">
      <div>
        <h2 id="resultTitle"></h2>
        <div class="result-meta" id="resultMeta"></div>
      </div>
      <button class="secondary" onclick="resetAll()">← 처음으로</button>
    </div>
    <div class="info-box">
      <div class="box-label">투자자 언어 포지셔닝</div>
      <div class="positioning-text" id="positioningText"></div>
      <div class="box-label" style="margin-top:10px">스토리라인 흐름</div>
      <div class="story-text" id="storyFlow"></div>
    </div>
    <div id="confirmBanner"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>P</th><th>섹션</th><th>핵심 메시지</th>
            <th>포함할 팩트</th><th>리프레이밍</th><th>세션 확인</th>
          </tr>
        </thead>
        <tbody id="slideTable"></tbody>
      </table>
    </div>
    <div class="update-card">
      <div class="card-title">멘토링 세션 추가 확인 내용 반영</div>
      <div class="update-desc">세션 중 확인된 사항, 수정된 수치, 포지셔닝 변경 등을 입력하면 표가 업데이트됩니다.</div>
      <textarea id="addNote" rows="5" placeholder="예:&#10;- 2025년 매출은 11.4억원으로 최종 확정&#10;- 스타필드 하남 계약은 협의 중 (확정 아님)&#10;- 포지셔닝을 포맷 라이선서로 확정"></textarea>
      <div id="updateError" class="error-box" style="display:none; margin-top:8px"></div>
      <div class="update-actions">
        <button class="accent" onclick="runStage2()">표 업데이트 →</button>
      </div>
    </div>
  </div>

</div>
<script>
const SLIDE_TAGS = {
  cover:{label:"표지",color:"#1A2F4E"},exec_summary:{label:"핵심요약",color:"#1A2F4E"},
  problem:{label:"문제정의",color:"#B91C1C"},solution:{label:"솔루션",color:"#1565C0"},
  customer_roi:{label:"고객ROI",color:"#1565C0"},technology:{label:"기술차별화",color:"#6D28D9"},
  market_size:{label:"시장규모",color:"#0F766E"},competitive:{label:"경쟁분석",color:"#0F766E"},
  moat:{label:"핵심해자",color:"#6D28D9"},traction:{label:"실적증명",color:"#166534"},
  biz_model:{label:"BM",color:"#1565C0"},revenue:{label:"매출",color:"#166534"},
  gtm:{label:"GTM",color:"#0F766E"},global_1:{label:"해외①",color:"#0F766E"},
  global_2:{label:"해외②",color:"#0F766E"},roadmap:{label:"로드맵",color:"#1565C0"},
  use_of_funds:{label:"투자금",color:"#B91C1C"},team:{label:"팀",color:"#1A2F4E"},
  milestones:{label:"마일스톤",color:"#166534"},ask:{label:"TheAsk",color:"#B91C1C"},
};

// 슬라이드 타입 순서 (1~10, 11~20)
const TYPES_A = ["cover","exec_summary","problem","solution","customer_roi","technology","market_size","competitive","moat","traction"];
const TYPES_B = ["biz_model","revenue","gtm","global_1","global_2","roadmap","use_of_funds","team","milestones","ask"];

const SYS_BASE = `SparkLabs G-ROUND IR 멘토. 기업 설문과 KPI 노트를 분석해 투자자 설득용 IR 슬라이드 핵심 메시지를 도출.
규칙: headline=투자자가 30초 안에 납득할 1문장, facts=최대2개 수치/팩트, reframe=설문원문→투자자언어(없으면null), confirm=세션확인사항(없으면null)
JSON 배열만 출력(다른텍스트없이): [{"page":N,"type":"타입","title":"제목","headline":"메시지","facts":["팩트"],"reframe":"또는null","confirm":"또는null"}]`;

const SYS_META = `SparkLabs G-ROUND IR 멘토. 기업 설문과 KPI 노트를 분석해 포지셔닝과 스토리라인을 도출.
JSON만 출력: {"positioning":"투자자언어 한줄포지셔닝","story_flow":"스토리라인흐름 3문장"}`;

const SYS_UPDATE = `SparkLabs IR 멘토. 기존 슬라이드 JSON 배열과 추가 확인 내용을 기반으로 업데이트.
해소된 confirm은 null로. 동일한 JSON 배열 형식으로만 응답.`;

let currentResult = null;
let contextSummary = '';

function onApiKeyChange() {
  const key = document.getElementById('apiKey').value.trim();
  const el = document.getElementById('apiStatus');
  el.textContent = key.startsWith('sk-ant-') ? '입력됨' : '미입력';
  el.className = 'api-status ' + (key.startsWith('sk-ant-') ? 'ok' : 'no');
}
function getApiKey() { return document.getElementById('apiKey').value.trim(); }

function setProgress(pct) {
  document.getElementById('progressFill').style.width = pct + '%';
}

async function apiCall(system, userMsg) {
  const key = getApiKey();
  if (!key) throw new Error('API 키를 입력해주세요.');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 3000,
      system,
      messages: [{ role: 'user', content: userMsg }],
    }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || 'API 오류');
  const raw = (data.content || []).map(b => b.text || '').join('');
  return JSON.parse(raw.replace(/```json|```/g, '').trim());
}

function setLoading(on, msg='', sub='') {
  document.getElementById('loading').style.display = on ? 'block' : 'none';
  document.getElementById('inputSection').style.display = on ? 'none' : 'block';
  document.getElementById('result').style.display = 'none';
  if (on) {
    document.getElementById('loadingMsg').textContent = msg;
    document.getElementById('loadingSub').textContent = sub;
    setProgress(0);
  }
}

async function runStage1() {
  const company = document.getElementById('company').value.trim();
  const mentor  = document.getElementById('mentor').value.trim();
  const stage   = document.getElementById('stage').value;
  const survey  = document.getElementById('survey').value.trim();
  const kpiNote = document.getElementById('kpiNote').value.trim();
  const errBox  = document.getElementById('inputError');
  if (!getApiKey()) { showErr(errBox,'API 키를 입력해주세요.'); return; }
  if (!company)     { showErr(errBox,'기업명을 입력해주세요.'); return; }
  if (!survey)      { showErr(errBox,'설문 답변을 입력해주세요.'); return; }
  errBox.style.display = 'none';

  const context = `[기업] ${company} / ${stage} / 멘토:${mentor||'미입력'}\n[설문]\n${survey}\n[KPI노트]\n${kpiNote||'없음'}`;
  contextSummary = context;

  setLoading(true, '포지셔닝 & 스토리라인 분석 중...', '1/3 단계');
  setProgress(10);

  try {
    // 1) 메타 (포지셔닝 + 스토리라인)
    const meta = await apiCall(SYS_META, context);
    setProgress(30);

    // 2) 슬라이드 1~10
    document.getElementById('loadingMsg').textContent = '슬라이드 1~10 구성 중...';
    document.getElementById('loadingSub').textContent = '2/3 단계';
    const promptA = `${context}\n\n아래 10개 슬라이드 타입으로 JSON 배열 생성(page 1~10):\n${TYPES_A.join(',')}`;
    const slidesA = await apiCall(SYS_BASE, promptA);
    setProgress(65);

    // 3) 슬라이드 11~20
    document.getElementById('loadingMsg').textContent = '슬라이드 11~20 구성 중...';
    document.getElementById('loadingSub').textContent = '3/3 단계';
    const promptB = `${context}\n\n아래 10개 슬라이드 타입으로 JSON 배열 생성(page 11~20):\n${TYPES_B.join(',')}`;
    const slidesB = await apiCall(SYS_BASE, promptB);
    setProgress(95);

    currentResult = {
      company, stage, mentor: mentor||'미입력',
      positioning: meta.positioning,
      story_flow: meta.story_flow,
      slides: [...slidesA, ...slidesB],
    };
    renderResult();
  } catch(e) {
    setLoading(false);
    showErr(errBox, '오류: ' + e.message);
    document.getElementById('inputSection').style.display = 'block';
  }
}

async function runStage2() {
  const addNote = document.getElementById('addNote').value.trim();
  const errBox  = document.getElementById('updateError');
  if (!addNote) return;
  errBox.style.display = 'none';
  document.getElementById('result').style.display = 'none';
  setLoading(true, '업데이트 중...', '추가 내용 반영 중');
  setProgress(30);

  try {
    const userMsg = `[기존슬라이드]\n${JSON.stringify(currentResult.slides)}\n\n[추가확인내용]\n${addNote}`;
    const updated = await apiCall(SYS_UPDATE, userMsg);
    setProgress(90);
    currentResult.slides = updated;
    document.getElementById('addNote').value = '';
    renderResult();
  } catch(e) {
    setLoading(false);
    document.getElementById('result').style.display = 'block';
    showErr(errBox, '오류: ' + e.message);
  }
}

function renderResult() {
  setLoading(false);
  document.getElementById('inputSection').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  const r = currentResult;
  const slides = r.slides || [];

  document.getElementById('resultTitle').textContent = r.company;
  document.getElementById('resultMeta').textContent = `${r.stage} · ${r.mentor} · ${slides.length}P`;
  document.getElementById('positioningText').textContent = r.positioning;
  document.getElementById('storyFlow').textContent = r.story_flow;

  const confirmList = slides.filter(s => s.confirm);
  document.getElementById('confirmBanner').innerHTML = confirmList.length > 0 ? `
    <div class="confirm-banner">
      <div class="banner-title">세션 중 확인 필요 ${confirmList.length}건</div>
      ${confirmList.map(s=>`<div class="confirm-item"><strong>P.${s.page} ${s.title}</strong> — ${s.confirm}</div>`).join('')}
    </div>` : '';

  document.getElementById('slideTable').innerHTML = slides.map(s => {
    const tag = SLIDE_TAGS[s.type] || { label: s.type, color: '#555' };
    const tagBg = tag.color + '18';
    const factsHtml = (s.facts||[]).length > 0
      ? s.facts.map(f=>`<div class="fact-item"><span class="fact-dot">·</span><span>${f}</span></div>`).join('')
      : `<span class="empty-cell">—</span>`;
    return `<tr class="${s.confirm?'has-confirm':''}">
      <td class="pg">${s.page}</td>
      <td class="section"><span class="sec-tag" style="background:${tagBg};color:${tag.color}">${tag.label}</span></td>
      <td class="headline">${s.headline}</td>
      <td class="facts">${factsHtml}</td>
      <td class="reframe">${s.reframe?`<span class="reframe-text">${s.reframe}</span>`:`<span class="empty-cell">—</span>`}</td>
      <td class="confirm">${s.confirm?`<span class="confirm-text">${s.confirm}</span>`:`<span class="empty-cell">—</span>`}</td>
    </tr>`;
  }).join('');
}

function resetAll() {
  currentResult = null;
  document.getElementById('result').style.display = 'none';
  document.getElementById('inputSection').style.display = 'block';
  document.getElementById('addNote').value = '';
}
function showErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }
</script>
</body>
</html>
