<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IR 멘토링 에이전트 — SparkLabs</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f7f8fa; color: #1a1a2e; min-height: 100vh; padding: 2rem 1.5rem 4rem; }
  .container { max-width: 1080px; margin: 0 auto; }
  label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
  input, select, textarea { width: 100%; padding: 8px 11px; font-size: 13px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a2e; font-family: inherit; outline: none; transition: border-color 0.15s; }
  input:focus, select:focus, textarea:focus { border-color: #4a6cf7; }
  textarea { resize: vertical; line-height: 1.6; }
  button { padding: 9px 22px; font-size: 13px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; background: #1a1a2e; color: #fff; font-family: inherit; transition: opacity 0.15s; }
  button:hover { opacity: 0.85; }
  button.secondary { background: #f1f3f4; color: #444; font-weight: 500; }
  button.secondary:hover { background: #e8eaed; opacity: 1; }
  button.accent { background: #4a6cf7; color: #fff; }

  .top-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 1.75rem; }
  .top-nav a { font-size: 12px; color: #999; text-decoration: none; }
  .top-nav a:hover { color: #444; }
  .top-nav .sep { color: #ccc; }
  .top-nav .current { font-size: 12px; color: #444; font-weight: 500; }
  .page-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: #666; margin-bottom: 1.75rem; line-height: 1.5; }

  .api-bar { background: #fff; border: 1px solid #e8eaed; border-radius: 10px; padding: 0.85rem 1.1rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 10px; }
  .api-bar label { margin: 0; flex-shrink: 0; font-weight: 500; font-size: 12px; color: #555; }
  .api-bar input { flex: 1; margin: 0; font-family: monospace; font-size: 12px; }
  .api-status { font-size: 11px; flex-shrink: 0; }
  .api-status.ok { color: #2e7d32; }
  .api-status.no { color: #999; }

  .card { background: #fff; border: 1px solid #e8eaed; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; }

  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }
  .error-box { background: #fdecea; border: 1px solid #f5c6c2; border-radius: 8px; padding: 8px 12px; font-size: 13px; color: #c62828; margin-bottom: 12px; }

  #loading { display: none; text-align: center; padding: 4rem 0; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-msg { font-size: 15px; color: #444; margin-bottom: 4px; }
  .loading-sub { font-size: 13px; color: #999; }
  .progress-bar { width: 220px; height: 3px; background: #e8eaed; border-radius: 2px; margin: 16px auto 0; }

  #result { display: none; }
  .result-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }

  .thesis-bar { background: #1a1a2e; color: #fff; border-radius: 10px; padding: 0.9rem 1.25rem; margin-bottom: 0.85rem; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 0.85rem; }
  .info-box { background: #fff; border: 1px solid #e8eaed; border-radius: 10px; padding: 1rem 1.25rem; }
  .box-label { font-size: 11px; font-weight: 600; color: #999; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
  .why-item { font-size: 13px; color: #444; margin-bottom: 5px; display: flex; gap: 6px; line-height: 1.5; }
  .why-dot { color: #4a6cf7; flex-shrink: 0; font-weight: 600; }
  .concern-item { font-size: 13px; color: #444; margin-bottom: 5px; display: flex; gap: 6px; line-height: 1.5; }
  .concern-num { color: #c62828; flex-shrink: 0; font-weight: 600; min-width: 14px; }

  /* 탭 */

  .tab-btn { padding: 8px 18px; font-size: 13px; font-weight: 500; border: none; background: transparent; cursor: pointer; color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color 0.15s; font-family: inherit; }
  .tab-btn:hover { color: #444; opacity: 1; }

  .tab-panel { display: none; padding-top: 1rem; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: #1a1a2e; }

  tbody tr { border-bottom: 1px solid #f1f3f4; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafbfc; }
  td { padding: 9px 12px; vertical-align: top; line-height: 1.55; }
  td.pg { font-size: 11px; color: #aaa; font-weight: 600; width: 28px; white-space: nowrap; }
  td.sec { width: 70px; }
  .sec-tag { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 6px; border-radius: 4px; white-space: nowrap; }
  td.claim { min-width: 150px; font-weight: 500; color: #1a1a2e; }
  td.fact-col { min-width: 140px; }
  td.interp { min-width: 120px; font-size: 12px; color: #555; }
  td.concl { min-width: 110px; }
  .concl-text { color: #166534; background: #e6f4ea; border-radius: 4px; padding: 3px 7px; display: inline-block; font-size: 12px; }
  .empty { color: #ddd; }

  /* Fact KPI 배지 */
  .fact-item { display: flex; gap: 6px; align-items: flex-start; margin-bottom: 4px; }
  .kpi-badge { font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 3px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
  .kpi-growth  { background: #e8f5e9; color: #2e7d32; }
  .kpi-eff     { background: #e8f0fe; color: #1a56db; }
  .kpi-defense { background: #fce8dc; color: #c25e00; }
  .kpi-missing { background: #fdecea; color: #c62828; }
  .fact-val { font-size: 12px; color: #1a1a2e; line-height: 1.5; }
  .fact-val.missing { color: #c62828; font-style: italic; }

  /* DD / VC Objections 탭 */
  .mentor-section-title { font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.06em; margin: 1.25rem 0 0.5rem; }
  .mentor-section-title:first-child { margin-top: 0; }

  .q-card { background: #fff; border: 1px solid #e8eaed; border-radius: 8px; padding: 0.85rem 1rem; margin-bottom: 8px; display: flex; gap: 10px; align-items: flex-start; }
  .q-card:hover { border-color: #c5cae9; }
  .q-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
  .q-concern  { background: #fdecea; color: #c62828; }
  .q-verify   { background: #fff8e1; color: #e65100; }
  .q-investor { background: #e8f0fe; color: #1a56db; }

  .q-slide { font-size: 11px; color: #aaa; flex-shrink: 0; margin-top: 2px; }

  .obj-card { background: #fff; border: 1px solid #e8eaed; border-radius: 8px; padding: 0.85rem 1rem; margin-bottom: 8px; }
  .obj-card:hover { border-color: #c5cae9; }
  .obj-q { font-size: 13px; font-weight: 500; color: #c62828; margin-bottom: 5px; }

  .update-card { background: #fff; border: 1px solid #e8eaed; border-radius: 12px; padding: 1.25rem 1.5rem; margin-top: 1.25rem; }

  .update-actions { display: flex; gap: 8px; margin-top: 10px; }
</style>

// ── 프롬프트 1: 분석 ─────────────────────────────────────

// ── 프롬프트 2: IR 슬라이드 ─────────────────────────────
const SYS_SLIDES = `VC 투자자 관점 SparkLabs IR 멘토.
[멘토 진단] 우선. 투자 논리를 증명하는 순서로 슬라이드 배치. 10~12장.

스토리 순서 원칙:

kpi: growth/efficiency/defense/missing`;

const SYS_MENTOR = `SparkLabs IR 멘토. [멘토 진단] 우선 참고.
멘토링 세션 DD 질문 8~10개 생성.

반드시 아래 형식으로만 출력. 다른 텍스트 없이.
DD|type|질문내용|슬라이드번호
type: concern(핵심리스크) / verify(수치검증) / process(프로세스이해)

const SYS_UPDATE = `SparkLabs IR 멘토.
기존 슬라이드 데이터(파이프 구분)와 추가 확인 내용으로 업데이트.
[SLIDES] 헤더 포함. 다른 텍스트 없이.`;

let state = { company:'', stage:'', slides:[], ddQs:[], objections:[], analysis:{} };

function onApiKeyChange() {
  const key = document.getElementById('apiKey').value.trim();
  const el = document.getElementById('apiStatus');
  el.textContent = key.startsWith('sk-ant-') ? '입력됨' : '미입력';
  el.className = 'api-status ' + (key.startsWith('sk-ant-') ? 'ok' : 'no');
}
function getApiKey() { return document.getElementById('apiKey').value.trim(); }
function setProgress(pct) { document.getElementById('progressFill').style.width = pct + '%'; }

async function apiCall(system, userMsg) {
  const key = getApiKey();
  if (!key) throw new Error('API 키를 입력해주세요.');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 3000,
      system,
      messages: [{ role: 'user', content: userMsg }],
    }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || 'API 오류');
  return (data.content || []).map(b => b.text || '').join('').trim();
}

function setLoading(on, msg='', sub='') {
  document.getElementById('loading').style.display = on ? 'block' : 'none';
  document.getElementById('inputSection').style.display = on ? 'none' : 'block';
  document.getElementById('result').style.display = 'none';
  if (on) {
    document.getElementById('loadingMsg').textContent = msg;
    document.getElementById('loadingSub').textContent = sub;
    setProgress(0);
  }
}

function parseKV(text) {
  const map = {};
  text.split('\n').forEach(line => {
    const idx = line.indexOf(':');
    if (idx > 0) map[line.slice(0,idx).trim()] = line.slice(idx+1).trim();
  });
  return map;
}

function parsePipeSection(text, section) {
  if (section === 'SLIDES') {
    return text.split('\n').map(l => l.trim())
      .filter(l => l && l.includes('|') && /^\d+\|/.test(l))
      .map(l => l.split('|').map(f => f.trim()));
  }
  if (section === 'DD_QUESTIONS') {
    return text.split('\n').map(l => l.trim())
      .filter(l => l.startsWith('DD|'))
      .map(l => l.slice(3).split('|').map(f => f.trim()));
  }
  if (section === 'VC_OBJECTIONS') {
    return text.split('\n').map(l => l.trim())
      .filter(l => l.startsWith('VC|'))
      .map(l => l.slice(3).split('|').map(f => f.trim()));
  }
  return [];
}

async function run() {
  const company    = document.getElementById('company').value.trim();
  const stage      = document.getElementById('stage').value;
  const survey     = document.getElementById('survey').value.trim();
  const mentorMemo = document.getElementById('mentorMemo').value.trim();
  const errBox     = document.getElementById('inputError');
  if (!getApiKey()) { showErr(errBox, 'API 키를 입력해주세요.'); return; }
  if (!company)     { showErr(errBox, '기업명을 입력해주세요.'); return; }
  if (!survey)      { showErr(errBox, '설문 답변을 입력해주세요.'); return; }
  errBox.style.display = 'none';
  state.company = company; state.stage = stage;

  const ctx = `[기업] ${company} / ${stage}\n\n[기업 설문]\n${survey}${mentorMemo ? '\n\n[멘토 진단]\n' + mentorMemo : ''}`;

  setLoading(true, '투자 논리 분석 중...', '1/3 — VC 관점 분석');
  setProgress(10);

  try {
    // 1) 분석
    const analysisRaw = await apiCall(SYS_ANALYSIS, ctx);
    const kv = parseKV(analysisRaw);
    state.analysis = {
      thesisLabel: kv['THESIS_LABEL'] || '',
      thesisReason: kv['THESIS_REASON'] || '',
      whyNow: [kv['WHY_NOW_1'], kv['WHY_NOW_2'], kv['WHY_NOW_3']].filter(Boolean),
      concerns: [kv['CONCERN_1'],kv['CONCERN_2'],kv['CONCERN_3'],kv['CONCERN_4'],kv['CONCERN_5']].filter(Boolean),
    };
    setProgress(38);

    // 2) 슬라이드
    document.getElementById('loadingMsg').textContent = '슬라이드 설계 중...';
    document.getElementById('loadingSub').textContent = '2/3 — IR Builder';
    const slidesRaw = await apiCall(SYS_SLIDES,
      ctx + `\n\n[투자논리] ${state.analysis.thesisLabel}`);
    state.slides = parsePipeSection(slidesRaw, 'SLIDES').map((f, i) => {
      const factParts = (f[3] || '-').split(':');
      return {
        page: parseInt(f[0]) || i+1,
        type: f[1] || 'cover',
        claim: f[2] || '',
        kpiType: factParts[0] || '-',
        factVal: factParts.slice(1).join(':').trim() || (f[3] || '-'),
        interp: f[4] || '-',
        conclusion: f[5] || '-',
      };
    }).filter(s => s.claim);
    setProgress(68);

    // 3) DD + Objections
    document.getElementById('loadingMsg').textContent = 'DD 질문 & VC Objections 생성 중...';
    document.getElementById('loadingSub').textContent = '3/3 — Mentor Mode';
    const mentorRaw = await apiCall(SYS_MENTOR,
      ctx + `\n\n[투자논리] ${state.analysis.thesisLabel}\n[슬라이드수] ${state.slides.length}`);
    state.ddQs = parsePipeSection(mentorRaw, 'DD_QUESTIONS').map(f => ({
      type: f[0] || 'verify', question: f[1] || '', slide: f[2] || '-',
    })).filter(q => q.question);
    state.objections = parsePipeSection(mentorRaw, 'VC_OBJECTIONS').map(f => ({
      objection: f[0] || '', answer: f[1] || '',
    })).filter(o => o.objection);
    setProgress(95);

    renderResult();
  } catch(e) {
    setLoading(false);
    showErr(errBox, '오류: ' + e.message);
    document.getElementById('inputSection').style.display = 'block';
  }
}

function renderResult() {
  setLoading(false);
  document.getElementById('inputSection').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  const a = state.analysis;

  document.getElementById('resultTitle').textContent = state.company;
  document.getElementById('resultMeta').textContent = `${state.stage} · ${state.slides.length}P`;

  document.getElementById('thesisBar').innerHTML = `
    <div class="tb-label">선택된 투자 논리</div>
    <div class="tb-name">${a.thesisLabel}</div>
    <div class="tb-reason">${a.thesisReason}</div>`;

  document.getElementById('whyNowList').innerHTML = a.whyNow.map(w =>
    `<div class="why-item"><span class="why-dot">→</span><span>${w}</span></div>`).join('');
  document.getElementById('concernList').innerHTML = a.concerns.map((c,i) =>
    `<div class="concern-item"><span class="concern-num">${i+1}</span><span>${c}</span></div>`).join('');

  // KPI 배지 매핑
  const kpiMap = {
    growth:    { label:'성장',   cls:'kpi-growth' },
    efficiency:{ label:'효율',   cls:'kpi-eff' },
    defense:   { label:'방어력', cls:'kpi-defense' },
    missing:   { label:'확인필요', cls:'kpi-missing' },
  };

  document.getElementById('irTable').innerHTML = state.slides.map(s => {
    const tag = SLIDE_TAGS[s.type] || { label: s.type, color: '#555' };
    const bg = tag.color + '18';
    const kpi = kpiMap[s.kpiType] || null;
    const factHtml = s.factVal && s.factVal !== '-'
      ? `<div class="fact-item">
          ${kpi ? `<span class="kpi-badge ${kpi.cls}">${kpi.label}</span>` : ''}
          <span class="fact-val ${s.kpiType==='missing'?'missing':''}">${s.factVal}</span>
        </div>`
      : `<span class="empty">—</span>`;
    return `<tr>
      <td class="pg">${s.page}</td>
      <td class="sec"><span class="sec-tag" style="background:${bg};color:${tag.color}">${tag.label}</span></td>
      <td class="claim">${s.claim}</td>
      <td class="fact-col">${factHtml}</td>
      <td class="interp">${s.interp!=='-'?s.interp:'<span class="empty">—</span>'}</td>
      <td class="concl">${s.conclusion!=='-'?`<span class="concl-text">${s.conclusion}</span>`:'<span class="empty">—</span>'}</td>
    </tr>`;
  }).join('');

  // DD Questions
  const ddTypeMap = {
    concern: { label:'핵심리스크', cls:'q-concern' },
    verify:  { label:'수치확인',   cls:'q-verify' },
    process: { label:'프로세스',   cls:'q-investor' },
  };
  const ddByType = { concern: [], verify: [], process: [] };
  state.ddQs.forEach(q => { (ddByType[q.type] || ddByType.verify).push(q); });
  let ddHtml = '';
  [['concern','핵심 리스크 검증'],['verify','수치 & 팩트 확인'],['process','프로세스 이해']].forEach(([type, title]) => {
    if (!ddByType[type].length) return;
    ddHtml += `<div class="mentor-section-title">${title}</div>`;
    ddByType[type].forEach(q => {
      const qt = ddTypeMap[q.type] || ddTypeMap.verify;
      ddHtml += `<div class="q-card">
        <span class="q-badge ${qt.cls}">${qt.label}</span>
        <span class="q-text">${q.question}</span>
        ${q.slide!=='-'?`<span class="q-slide">P.${q.slide}</span>`:''}
      </div>`;
    });
  });
  document.getElementById('ddContent').innerHTML = ddHtml || '<p style="color:#aaa;font-size:13px">질문 데이터가 없습니다.</p>';

  // VC Objections
  document.getElementById('objContent').innerHTML = state.objections.map(o => `
    <div class="obj-card">
      <div class="obj-q">Q. ${o.objection}</div>
      <div class="obj-a">→ ${o.answer}</div>
    </div>`).join('') || '<p style="color:#aaa;font-size:13px">데이터가 없습니다.</p>';
}

async function runUpdate() {
  const addNote = document.getElementById('addNote').value.trim();
  const errBox  = document.getElementById('updateError');
  if (!addNote) return;
  errBox.style.display = 'none';
  document.getElementById('result').style.display = 'none';
  setLoading(true, '업데이트 중...', '확인 내용 반영 중');
  setProgress(40);

  const slidesText = state.slides.map(s =>
    `${s.page}|${s.type}|${s.claim}|${s.kpiType}:${s.factVal}|${s.interp}|${s.conclusion}`).join('\n');
  try {
    const raw = await apiCall(SYS_UPDATE,
      `[기존슬라이드]\n${slidesText}\n\n[추가확인]\n${addNote}`);
    const block = raw.includes('[SLIDES]') ? raw : '[SLIDES]\n' + raw;
    const updated = parsePipeSection(block, 'SLIDES').map((f,i) => {
      const fp = (f[3]||'-').split(':');
      return { page:parseInt(f[0])||i+1, type:f[1]||'', claim:f[2]||'',
        kpiType:fp[0]||'-', factVal:fp.slice(1).join(':').trim()||(f[3]||'-'),
        interp:f[4]||'-', conclusion:f[5]||'-' };
    }).filter(s => s.claim);
    if (updated.length > 0) state.slides = updated;
    document.getElementById('addNote').value = '';
    setProgress(95);
    renderResult();
  } catch(e) {
    setLoading(false);
    document.getElementById('result').style.display = 'block';
    showErr(errBox, '오류: ' + e.message);
  }
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    const names = ['ir','dd','obj'];
    b.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

function resetAll() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('inputSection').style.display = 'block';
  document.getElementById('addNote').value = '';
  switchTab('ir');
}
function showErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }
</script>
