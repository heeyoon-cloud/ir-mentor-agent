<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IR 멘토링 에이전트 — SparkLabs</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f7f8fa;
    color: #1a1a2e;
    min-height: 100vh;
    padding: 2rem 1.5rem 4rem;
  }
  .container { max-width: 820px; margin: 0 auto; }

  /* ── 공통 ── */
  label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
  input, select, textarea {
    width: 100%; padding: 8px 11px; font-size: 13px;
    border: 1px solid #ddd; border-radius: 8px;
    background: #fff; color: #1a1a2e;
    font-family: inherit; outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: #4a6cf7; }
  textarea { resize: vertical; line-height: 1.6; }
  button {
    padding: 9px 22px; font-size: 13px; font-weight: 600;
    border: none; border-radius: 8px; cursor: pointer;
    background: #1a1a2e; color: #fff;
    transition: opacity 0.15s;
    font-family: inherit;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  button.secondary {
    background: #f1f3f4; color: #444; font-weight: 500;
  }
  button.secondary:hover { background: #e8eaed; }
  button.accent {
    background: #4a6cf7; color: #fff;
  }

  /* ── 헤더 ── */
  .top-nav {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 1.75rem;
  }
  .top-nav a { font-size: 12px; color: #999; text-decoration: none; }
  .top-nav a:hover { color: #444; }
  .top-nav .sep { color: #ccc; font-size: 12px; }
  .top-nav .current { font-size: 12px; color: #444; font-weight: 500; }

  .page-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: #666; margin-bottom: 1.75rem; line-height: 1.5; }

  /* ── API 키 배너 ── */
  .api-bar {
    background: #fff; border: 1px solid #e8eaed; border-radius: 10px;
    padding: 0.85rem 1.1rem; margin-bottom: 1.25rem;
    display: flex; align-items: center; gap: 10px;
  }
  .api-bar label { margin: 0; flex-shrink: 0; font-weight: 500; font-size: 12px; color: #555; }
  .api-bar input { flex: 1; margin: 0; font-family: monospace; font-size: 12px; }
  .api-bar .api-status { font-size: 11px; flex-shrink: 0; }
  .api-status.ok { color: #2e7d32; }
  .api-status.no { color: #999; }

  /* ── 폼 ── */
  .card {
    background: #fff; border: 1px solid #e8eaed;
    border-radius: 12px; padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 1rem; color: #1a1a2e; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }

  .error-box {
    background: #fdecea; border: 1px solid #f5c6c2;
    border-radius: 8px; padding: 8px 12px;
    font-size: 13px; color: #c62828; margin-bottom: 12px;
  }

  /* ── 로딩 ── */
  #loading {
    display: none; text-align: center; padding: 4rem 0;
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid #e8eaed;
    border-top-color: #4a6cf7; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-msg { font-size: 15px; color: #444; margin-bottom: 4px; }
  .loading-sub { font-size: 13px; color: #999; }

  /* ── 결과 ── */
  #result { display: none; }

  .result-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 1rem; flex-wrap: wrap; gap: 8px;
  }
  .result-header h2 { font-size: 18px; font-weight: 600; }
  .result-meta { font-size: 13px; color: #666; margin-top: 2px; }

  .positioning-box {
    background: #fff; border: 1px solid #e8eaed; border-radius: 10px;
    padding: 1rem 1.25rem; margin-bottom: 0.85rem;
  }
  .box-label { font-size: 11px; font-weight: 600; color: #999; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 5px; }
  .positioning-text { font-size: 15px; font-weight: 600; color: #1a1a2e; margin-bottom: 10px; }
  .story-text { font-size: 13px; color: #555; line-height: 1.7; }

  /* 확인 배너 */
  .confirm-banner {
    background: #fff8e1; border: 1px solid #ffe082; border-radius: 10px;
    padding: 0.85rem 1.1rem; margin-bottom: 0.85rem;
  }
  .confirm-banner .banner-title { font-size: 12px; font-weight: 600; color: #e65100; margin-bottom: 6px; }
  .confirm-item { font-size: 12px; color: #bf360c; margin-bottom: 3px; }
  .confirm-item strong { font-weight: 600; }

  /* 슬라이드 그리드 */
  .slide-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 9px; margin-bottom: 1rem;
  }
  .slide-card {
    background: #fff; border: 1px solid #e8eaed;
    border-radius: 10px; padding: 0.85rem 1rem;
    cursor: pointer; transition: border-color 0.15s;
  }
  .slide-card:hover { border-color: #c5cae9; }
  .slide-card.has-confirm { border-color: #ffe082; }
  .slide-card.open { border-color: #90caf9; }

  .slide-card-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .slide-page { font-size: 11px; color: #aaa; margin-bottom: 2px; }
  .slide-toggle { font-size: 11px; color: #bbb; flex-shrink: 0; margin-left: 6px; }
  .slide-tag {
    display: inline-block; font-size: 11px; font-weight: 500;
    padding: 2px 8px; border-radius: 4px; margin-bottom: 4px;
  }
  .slide-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; line-height: 1.4; }
  .slide-headline {
    font-size: 13px; color: #555; line-height: 1.55;
    border-top: 1px solid #f1f3f4; padding-top: 7px;
  }

  /* 펼침 영역 */
  .slide-detail { margin-top: 10px; display: none; }
  .slide-card.open .slide-detail { display: block; }
  .detail-section { margin-bottom: 8px; }
  .detail-label { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .logic-text { font-size: 12px; color: #888; line-height: 1.6; font-style: italic; }
  .fact-item { font-size: 13px; color: #333; margin-bottom: 3px; display: flex; gap: 6px; }
  .fact-dot { color: #ccc; flex-shrink: 0; }
  .reframe-box {
    background: #e8f0fe; border-radius: 6px; padding: 7px 10px;
    font-size: 12px; color: #1a56db; line-height: 1.55;
  }
  .confirm-box {
    background: #fff8e1; border-radius: 6px; padding: 7px 10px;
    font-size: 12px; color: #e65100; line-height: 1.55;
  }
  .detail-bold { font-weight: 600; }

  /* 2단계 */
  .update-card {
    background: #fff; border: 1px solid #e8eaed; border-radius: 12px;
    padding: 1.25rem 1.5rem; margin-bottom: 1rem;
  }
  .update-card .card-title { margin-bottom: 6px; }
  .update-desc { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 12px; }
  .update-actions { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
</style>
</head>
<body>
<div class="container">

  <!-- 네비 -->
  <div class="top-nav">
    <a href="../">SparkLabs Tools</a>
    <span class="sep">›</span>
    <span class="current">IR 멘토링 에이전트</span>
  </div>

  <div class="page-title">IR 멘토링 에이전트</div>
  <div class="page-sub">기업 설문 + KPI 노트 → 슬라이드별 핵심 메시지 & 스토리라인 카드<br>멘토링 세션 중 추가 확인 내용을 반영해 카드를 업데이트할 수 있습니다.</div>

  <!-- API 키 -->
  <div class="api-bar">
    <label for="apiKey">Anthropic API Key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." oninput="onApiKeyChange()">
    <span class="api-status no" id="apiStatus">미입력</span>
  </div>

  <!-- 입력 폼 -->
  <div id="inputSection">
    <div class="card">
      <div class="card-title">기업 정보</div>
      <div class="grid-3">
        <div>
          <label>기업명 *</label>
          <input type="text" id="company" placeholder="예: 서프라이스">
        </div>
        <div>
          <label>담당 멘토</label>
          <input type="text" id="mentor" placeholder="예: 이희윤">
        </div>
        <div>
          <label>투자 단계</label>
          <select id="stage">
            <option>Pre-Seed</option>
            <option>Seed</option>
            <option selected>Pre-A</option>
            <option>Series A</option>
            <option>Series B+</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">기업 설문 답변 *</div>
      <textarea id="survey" rows="8" placeholder="설문지 답변 전체를 그대로 붙여넣으세요.&#10;&#10;예: 주식회사 서프라이스	반도체 공정을 위한 협동로봇의 고정밀화	송지훈	..."></textarea>
    </div>

    <div class="card">
      <div class="card-title">멘토 KPI 노트 &amp; 코멘트</div>
      <textarea id="kpiNote" rows="7" placeholder="사전진단 미팅 메모, KPI 세팅 내용, 핵심 인사이트 등&#10;&#10;예:&#10;- 수율 +3~4%, 택타임 20배 단축 수치 IR에 반영 필요&#10;- UR+ 인증 완료 시 전 세계 UR 디스트리뷰터 자동 노출 가능&#10;- 베트남 진출은 기존 고객사 이전 요구로 Pull 방식"></textarea>
    </div>

    <div id="inputError" class="error-box" style="display:none"></div>
    <button onclick="runStage1()">핵심 메시지 &amp; 스토리라인 생성 →</button>
  </div>

  <!-- 로딩 -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-msg" id="loadingMsg">분석 중...</div>
    <div class="loading-sub" id="loadingSub">잠시만 기다려주세요</div>
  </div>

  <!-- 결과 -->
  <div id="result">
    <div class="result-header">
      <div>
        <h2 id="resultTitle"></h2>
        <div class="result-meta" id="resultMeta"></div>
      </div>
      <button class="secondary" onclick="resetAll()">← 처음으로</button>
    </div>

    <div class="positioning-box">
      <div class="box-label">투자자 언어 포지셔닝</div>
      <div class="positioning-text" id="positioningText"></div>
      <div class="box-label" style="margin-top:10px">스토리라인 흐름</div>
      <div class="story-text" id="storyFlow"></div>
    </div>

    <div id="confirmBanner"></div>
    <div class="slide-grid" id="slideGrid"></div>

    <!-- 2단계 -->
    <div class="update-card" id="updateCard">
      <div class="card-title">멘토링 세션 추가 확인 내용 반영</div>
      <div class="update-desc">세션 중 확인된 사항, 수정된 수치, 포지셔닝 변경 등을 입력하면 카드가 업데이트됩니다.</div>
      <textarea id="addNote" rows="6" placeholder="예:&#10;- 2025년 매출은 11.4억원으로 최종 확정&#10;- 스타필드 하남 계약은 협의 중 (확정 아님)&#10;- 포지셔닝을 '포맷 라이선서'로 확정&#10;- 일본 이온몰은 LOI 단계 아님, 논의 중"></textarea>
      <div id="updateError" class="error-box" style="display:none; margin-top:8px"></div>
      <div class="update-actions">
        <button class="accent" onclick="runStage2()">카드 업데이트 →</button>
      </div>
    </div>
  </div>

</div>

<script>
// ── 슬라이드 타입 정의 ────────────────────────────────────────
const SLIDE_TAGS = {
  cover:        { label: "표지",           color: "#1A2F4E" },
  exec_summary: { label: "핵심 요약",      color: "#1A2F4E" },
  problem:      { label: "문제 정의",      color: "#B91C1C" },
  solution:     { label: "솔루션",         color: "#1565C0" },
  customer_roi: { label: "고객 ROI",       color: "#1565C0" },
  technology:   { label: "기술 차별화",    color: "#6D28D9" },
  market_size:  { label: "시장 규모",      color: "#0F766E" },
  competitive:  { label: "경쟁 분석",      color: "#0F766E" },
  moat:         { label: "핵심 해자",      color: "#6D28D9" },
  traction:     { label: "실적 증명",      color: "#166534" },
  biz_model:    { label: "비즈니스 모델",  color: "#1565C0" },
  revenue:      { label: "매출 현황·전망", color: "#166534" },
  gtm:          { label: "GTM 전략",       color: "#0F766E" },
  global_1:     { label: "해외 진출 ①",   color: "#0F766E" },
  global_2:     { label: "해외 진출 ②",   color: "#0F766E" },
  roadmap:      { label: "제품 로드맵",    color: "#1565C0" },
  use_of_funds: { label: "투자금 사용",    color: "#B91C1C" },
  team:         { label: "팀",             color: "#1A2F4E" },
  milestones:   { label: "마일스톤",       color: "#166534" },
  ask:          { label: "The Ask",        color: "#B91C1C" },
};

// ── 시스템 프롬프트 ────────────────────────────────────────────
const SYSTEM_STAGE1 = `당신은 SparkLabs G-ROUND 글로벌 창업사관학교 IR 전문 멘토입니다.
기업의 설문 답변과 멘토 KPI 노트를 분석해, 투자자를 설득할 수 있는 IR 스토리라인과 슬라이드별 핵심 메시지를 도출하세요.

목적: 스크립트 생성이 아닌, 기업이 직접 IR 자료를 만들 때 참고할 메시지 설계도 제공
출력 원칙:
- headline: 투자자가 30초 안에 납득할 수 있는 핵심 메시지 1문장
- story_logic: 왜 이 슬라이드가 이 순서에 있는가 (1~2문장)
- key_facts: 반드시 포함해야 할 수치/팩트 목록
- reframe: 설문 원문 표현을 투자자 언어로 바꾼 핵심 포인트 (없으면 null)
- confirm_needed: 멘토링 세션에서 기업에게 확인해야 할 사항 (없으면 null)

반드시 아래 JSON만 출력 (다른 텍스트 없이):
{
  "company": "기업명",
  "stage": "투자단계",
  "mentor": "멘토명",
  "positioning": "투자자 언어 한줄 포지셔닝",
  "story_flow": "전체 스토리라인 흐름 요약 (3~4문장, 왜 이 순서로 설득하는지 논리 포함)",
  "slides": [
    {
      "page": 1,
      "type": "cover",
      "title": "슬라이드 제목",
      "headline": "핵심 메시지 1문장",
      "story_logic": "이 슬라이드가 이 위치에 있는 이유",
      "key_facts": ["팩트1", "팩트2"],
      "reframe": "리프레이밍 포인트 또는 null",
      "confirm_needed": "확인 필요 사항 또는 null"
    }
  ]
}
슬라이드는 반드시 20개. type은 다음 중 하나: cover, exec_summary, problem, solution, customer_roi, technology, market_size, competitive, moat, traction, biz_model, revenue, gtm, global_1, global_2, roadmap, use_of_funds, team, milestones, ask`;

const SYSTEM_STAGE2 = `당신은 SparkLabs G-ROUND IR 멘토입니다.
1차 분석 JSON과 멘토링 세션 추가 확인 내용을 기반으로 JSON을 업데이트하세요.
- 추가 확인 내용이 특정 슬라이드와 관련 있으면 해당 슬라이드만 업데이트
- 해소된 confirm_needed는 null로 변경
- story_flow도 필요시 업데이트
- 기존 JSON 구조 그대로 유지, 변경된 필드만 수정
반드시 동일한 JSON 형식으로만 응답.`;

// ── 상태 ──────────────────────────────────────────────────────
let currentResult = null;
let openCardIndex = null;

// ── API 키 ────────────────────────────────────────────────────
function onApiKeyChange() {
  const key = document.getElementById('apiKey').value.trim();
  const status = document.getElementById('apiStatus');
  if (key.startsWith('sk-ant-')) {
    status.textContent = '입력됨'; status.className = 'api-status ok';
  } else {
    status.textContent = '미입력'; status.className = 'api-status no';
  }
}

function getApiKey() { return document.getElementById('apiKey').value.trim(); }

// ── API 호출 ──────────────────────────────────────────────────
async function callClaude(system, userMsg, loadingMsgText, loadingSubText) {
  const key = getApiKey();
  if (!key) throw new Error('API 키를 입력해주세요.');
  setLoading(true, loadingMsgText, loadingSubText);
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      system,
      messages: [{ role: 'user', content: userMsg }],
    }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || 'API 오류');
  const raw = (data.content || []).map(b => b.text || '').join('');
  return JSON.parse(raw.replace(/```json|```/g, '').trim());
}

// ── 로딩 토글 ─────────────────────────────────────────────────
function setLoading(on, msg = '', sub = '') {
  document.getElementById('loading').style.display = on ? 'block' : 'none';
  document.getElementById('inputSection').style.display = on ? 'none' : 'block';
  document.getElementById('result').style.display = 'none';
  if (on) {
    document.getElementById('loadingMsg').textContent = msg;
    document.getElementById('loadingSub').textContent = sub;
  }
}

// ── 1단계 실행 ────────────────────────────────────────────────
async function runStage1() {
  const company = document.getElementById('company').value.trim();
  const mentor  = document.getElementById('mentor').value.trim();
  const stage   = document.getElementById('stage').value;
  const survey  = document.getElementById('survey').value.trim();
  const kpiNote = document.getElementById('kpiNote').value.trim();
  const errBox  = document.getElementById('inputError');

  if (!getApiKey()) { showError(errBox, 'API 키를 입력해주세요.'); return; }
  if (!company)     { showError(errBox, '기업명을 입력해주세요.'); return; }
  if (!survey)      { showError(errBox, '설문 답변을 입력해주세요.'); return; }
  errBox.style.display = 'none';

  const userMsg = `[기업명] ${company}\n[투자 단계] ${stage}\n[담당 멘토] ${mentor || '미입력'}\n\n[기업 설문 답변]\n${survey}\n\n[멘토 KPI 노트 & 코멘트]\n${kpiNote || '없음'}`;

  try {
    const parsed = await callClaude(SYSTEM_STAGE1, userMsg, '설문 분석 중...', '투자자 관점으로 스토리라인을 구성하고 있습니다 (약 30~60초)');
    currentResult = parsed;
    renderResult();
  } catch(e) {
    setLoading(false);
    showError(errBox, '오류: ' + e.message);
    document.getElementById('inputSection').style.display = 'block';
  }
}

// ── 2단계 실행 ────────────────────────────────────────────────
async function runStage2() {
  const addNote = document.getElementById('addNote').value.trim();
  const errBox  = document.getElementById('updateError');
  if (!addNote) return;
  errBox.style.display = 'none';

  const userMsg = `[1차 분석 결과]\n${JSON.stringify(currentResult, null, 2)}\n\n[멘토링 세션 추가 확인 내용]\n${addNote}`;

  // 결과 화면 숨기고 로딩
  document.getElementById('result').style.display = 'none';
  try {
    const updated = await callClaude(SYSTEM_STAGE2, userMsg, '추가 내용 반영 중...', '카드를 업데이트하고 있습니다');
    currentResult = updated;
    document.getElementById('addNote').value = '';
    renderResult();
  } catch(e) {
    setLoading(false);
    document.getElementById('result').style.display = 'block';
    showError(errBox, '오류: ' + e.message);
  }
}

// ── 결과 렌더링 ───────────────────────────────────────────────
function renderResult() {
  setLoading(false);
  document.getElementById('inputSection').style.display = 'none';
  document.getElementById('result').style.display = 'block';

  const r = currentResult;
  const slides = r.slides || [];

  document.getElementById('resultTitle').textContent = r.company;
  document.getElementById('resultMeta').textContent = `${r.stage} · ${r.mentor || '멘토 미입력'} · ${slides.length}P`;
  document.getElementById('positioningText').textContent = r.positioning;
  document.getElementById('storyFlow').textContent = r.story_flow;

  // 확인 배너
  const confirmList = slides.filter(s => s.confirm_needed);
  const banner = document.getElementById('confirmBanner');
  if (confirmList.length > 0) {
    banner.innerHTML = `
      <div class="confirm-banner">
        <div class="banner-title">세션 중 확인 필요 ${confirmList.length}건</div>
        ${confirmList.map(s => `<div class="confirm-item"><strong>P.${s.page} ${s.title}</strong> — ${s.confirm_needed}</div>`).join('')}
      </div>`;
  } else {
    banner.innerHTML = '';
  }

  // 슬라이드 카드
  const grid = document.getElementById('slideGrid');
  grid.innerHTML = slides.map((slide, i) => {
    const tag = SLIDE_TAGS[slide.type] || { label: slide.type, color: '#555' };
    const tagBg = tag.color + '18';
    const hasConfirm = !!slide.confirm_needed;
    return `
      <div class="slide-card${hasConfirm ? ' has-confirm' : ''}" id="card-${i}" onclick="toggleCard(${i})">
        <div class="slide-card-top">
          <div style="flex:1;min-width:0">
            <div class="slide-page">P.${slide.page}</div>
            <span class="slide-tag" style="background:${tagBg};color:${tag.color}">${tag.label}</span>
            <div class="slide-title">${slide.title}</div>
          </div>
          <div class="slide-toggle" id="toggle-${i}">▼</div>
        </div>
        <div class="slide-headline">${slide.headline}</div>
        <div class="slide-detail" id="detail-${i}">
          ${slide.story_logic ? `
            <div class="detail-section">
              <div class="detail-label">스토리 논리</div>
              <div class="logic-text">${slide.story_logic}</div>
            </div>` : ''}
          ${slide.key_facts && slide.key_facts.length > 0 ? `
            <div class="detail-section">
              <div class="detail-label">포함할 팩트</div>
              ${slide.key_facts.map(f => `<div class="fact-item"><span class="fact-dot">·</span><span>${f}</span></div>`).join('')}
            </div>` : ''}
          ${slide.reframe ? `
            <div class="detail-section">
              <div class="reframe-box"><span class="detail-bold">리프레이밍 · </span>${slide.reframe}</div>
            </div>` : ''}
          ${slide.confirm_needed ? `
            <div class="detail-section">
              <div class="confirm-box"><span class="detail-bold">세션 확인 필요 · </span>${slide.confirm_needed}</div>
            </div>` : ''}
        </div>
      </div>`;
  }).join('');

  openCardIndex = null;
}

// ── 카드 토글 ─────────────────────────────────────────────────
function toggleCard(i) {
  if (openCardIndex === i) {
    document.getElementById(`card-${i}`).classList.remove('open');
    document.getElementById(`toggle-${i}`).textContent = '▼';
    openCardIndex = null;
  } else {
    if (openCardIndex !== null) {
      document.getElementById(`card-${openCardIndex}`)?.classList.remove('open');
      document.getElementById(`toggle-${openCardIndex}`).textContent = '▼';
    }
    document.getElementById(`card-${i}`).classList.add('open');
    document.getElementById(`toggle-${i}`).textContent = '▲';
    openCardIndex = i;
  }
}

// ── 리셋 ──────────────────────────────────────────────────────
function resetAll() {
  currentResult = null; openCardIndex = null;
  document.getElementById('result').style.display = 'none';
  document.getElementById('inputSection').style.display = 'block';
  document.getElementById('addNote').value = '';
}

// ── 에러 표시 ─────────────────────────────────────────────────
function showError(el, msg) {
  el.textContent = msg; el.style.display = 'block';
}
</script>
</body>
</html>
